<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F766E" />
  <title>{% block title %}מערכת ניהול תלמידים{% endblock %}</title>

  <!-- Rubik — Hebrew + Latin -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- Bootstrap 5 RTL -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Custom -->
  <link rel="stylesheet" href="/static/css/custom.css?v={{ static_v('css/custom.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg app-navbar navbar-light border-bottom mb-0">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand app-navbar-brand" href="/">
      <span class="app-brand-mark" aria-hidden="true">
        <i class="bi bi-translate"></i>
      </span>
      <span class="app-navbar-brand-text">
        <span class="app-navbar-title">שיעורי אנגלית</span>
        <span class="app-navbar-tagline d-none d-md-inline">לוח · תלמידים · תשלומים</span>
      </span>
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="תפריט">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-1">
        <li class="nav-item">
          <a class="nav-link app-nav-link {% if request.url.path == '/calendar' %}active{% endif %}" href="/calendar">לוח שנה</a>
        </li>
        <li class="nav-item">
          <a class="nav-link app-nav-link {% if '/students' in request.url.path %}active{% endif %}" href="/students/">תלמידים</a>
        </li>
        <li class="nav-item">
          <a class="nav-link app-nav-link {% if '/reports' in request.url.path %}active{% endif %}" href="/reports/">דוחות</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 px-lg-4 app-main">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
